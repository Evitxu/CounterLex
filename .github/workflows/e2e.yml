name: e2e

on:
  push:
    branches: [frontend]
  pull_request:
    branches: [frontend]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      # The API lives on the `backend` branch (one branch per component).
      - name: Checkout backend (API)
        uses: actions/checkout@v4
        with:
          ref: backend
          path: backend-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r backend-src/requirements.txt

      - name: Start backend (isolated DB, keyword fallback — no LLM needed)
        working-directory: backend-src
        env:
          SQLITE_PATH: ${{ runner.temp }}/e2e.db
          ALLOW_EXTRACTOR_FALLBACK: "true"
          BOOTSTRAP_ON_STARTUP: "true"
          OCR_ENABLED: "false"
          DEFAULT_CORPUS_SIZE: "200"
          FRONTEND_ORIGIN: "http://localhost:3000"
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > "$RUNNER_TEMP/backend.log" 2>&1 &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then echo "backend up"; break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/health || (echo "backend failed to start"; cat "$RUNNER_TEMP/backend.log"; exit 1)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: "true"
          NEXT_PUBLIC_API_BASE: "http://localhost:8000/api/v1"
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7