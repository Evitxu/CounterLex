name: CI

# Backend branch: code lives at the repo root, so no working-directory needed.
on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest
